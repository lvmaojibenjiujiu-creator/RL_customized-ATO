dhp_sbr:
  policy_name: "DHP-SBR"
  calibration_mode: "saa_grid"
  fallback_calibration_mode: "formula_init"
  edge_prob_threshold: 0.05
  Z_max: 10
  unrevealed_load_weight_mode: "none"
  imminent_pipeline_window_mode: "mean_lead_time"
  aggregate_lead_time_mode: "max"
  replenishment_target_aggregation: "min"
  n_cal_paths_small: 300
  n_cal_paths_large: 300
  T_cal: 200
  warmup: 50
  safety_factor: 0.0
  max_S_candidate_multiplier: 1.5
  reserve_factor: 0.5
  state_sensitivity: 0.0
  restrict_R_leq_S: true
  candidate_step_small: 1
  candidate_step_large: 2
  max_grid_points: 9
  parallel: false
  cache_tables: true
  cache_dir: "outputs/dhp_sbr_calibration"
  calibration_time_limit_seconds: 3600
  run_in_base_case: true
  run_in_sensitivity: true
